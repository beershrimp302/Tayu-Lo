    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .intro-container {
            max-width: 600px;
            text-align: center;
            margin-bottom: 30px;
        }

        .intro-text {
            color: #b3b3b3;
            font-size: 16px;
            line-height: 1.6;
        }

        .library-container {
            width: 100%;
            max-width: 600px;
            background-color: #181818;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
        }

        .library-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #282828;
            padding-bottom: 10px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: #282828;
            border-radius: 4px;
            text-decoration: none;
            color: #ffffff;
            transition: background-color 0.2s;
        }

        .track-item:hover {
            background-color: #3e3e3e;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-icon {
            width: 24px;
            height: 24px;
            fill: #1db954;
        }

        .track-name {
            font-size: 16px;
            font-weight: 500;
        }

        .track-action {
            color: #b3b3b3;
            font-size: 14px;
        }
    </style>
</head>
